<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Emotion Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="main-heading">Emotion Detector</h1>
            <p class="subtitle">Analyze the emotional tone of your text using Watson NLP</p>
        </header>

        <main class="input-section">
            <label for="textToAnalyze">Enter the text you want to analyze:</label>
            <textarea id="textToAnalyze" rows="5" placeholder="Example: I am so happy to see the progress we've made!"></textarea>
            
            <div class="action-area">
                <button class="btn-primary" onclick="RunSentimentAnalysis()">Analyze Emotion</button>
            </div>
        </main>

        <section id="response-container">
            <div id="system_response">
                </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='mywebscript.js') }}"></script>
</body>
</html>
